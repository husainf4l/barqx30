server {
    listen 80;
    server_name barqtest.aqlaan.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name barqtest.aqlaan.com;

    # SSL - managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/barqtest.aqlaan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/barqtest.aqlaan.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CDN / file serving headers
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-CDN "barqtest.aqlaan.com";

    client_max_body_size 10G;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;

    location / {
        proxy_pass         http://127.0.0.1:8101;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for large uploads/downloads
        proxy_buffering        off;
        proxy_request_buffering off;
    }

    # Health check endpoint (no cache)
    location /health {
        proxy_pass http://127.0.0.1:8101/health;
        add_header Cache-Control "no-store";
    }

    access_log /var/log/nginx/barqtest.access.log;
    error_log  /var/log/nginx/barqtest.error.log;
}
